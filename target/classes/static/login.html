<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – AP Car Rentals</title>
  <meta name="description" content="Login to your AP Cars account to manage bookings."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">🚗</div>
      <div class="logo-text">AP <span>Cars</span></div>
    </a>
    <div class="nav-actions">
      <a href="register.html" class="btn btn-primary btn-sm">Register</a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="margin:0 auto 12px">🚗</div>
    </div>
    <h1 class="auth-title">Welcome Back!</h1>
    <p class="auth-sub">Login to access your AP Cars account</p>

    <div class="error-msg" id="errorMsg">❌ Invalid credentials. Please try again.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary form-submit btn-lg" id="loginBtn">
        Login to AP Cars →
      </button>
    </form>

    <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
    <p class="auth-link" style="margin-top:8px">
      <a href="admin-dashboard.html" style="color:var(--text-muted);font-size:0.8rem">Admin Login →</a>
    </p>
  </div>
</main>

<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('carRentalToken')) {
     const user = JSON.parse(localStorage.getItem('carRentalUser') || '{}');
     if (user.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
     else if (user.role === 'OWNER') window.location.href = 'owner-dashboard.html';
     else window.location.href = 'user-dashboard.html';
  }
});

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';
  btn.innerHTML = '⏳ Logging in...';
  btn.disabled = true;

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const data = await apiFetch('/api/auth/login', 'POST', { email, password });
    localStorage.setItem('carRentalToken', data.token);
    localStorage.setItem('carRentalUser', JSON.stringify({ id: data.userId, name: data.name, email: data.email, role: data.role }));
    showToast('✅ Login successful! Welcome back, ' + data.name, 'success');
    setTimeout(() => {
      if (data.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
      else if (data.role === 'OWNER') window.location.href = 'owner-dashboard.html';
      else window.location.href = 'user-dashboard.html';
    }, 800);
  } catch (err) {
    errorMsg.style.display = 'block';
    btn.innerHTML = 'Login to AP Cars →';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
