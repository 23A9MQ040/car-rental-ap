<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – AP Car Rentals</title>
  <meta name="description" content="Create your free AP Cars account and start renting cars across Andhra Pradesh."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">🚗</div>
      <div class="logo-text">AP <span>Cars</span></div>
    </a>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card" style="max-width:540px">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join 5000+ users renting cars across Andhra Pradesh</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Ravi Kumar" required/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 6304467639" required pattern="[0-9+\s\-]{10,14}"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="ravi@example.com" required autocomplete="email"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <select id="city" required>
            <option value="">Select City</option>
            <option>Visakhapatnam</option>
            <option>Vijayawada</option>
            <option>Tirupati</option>
            <option>Guntur</option>
            <option>Kakinada</option>
            <option>Rajahmundry</option>
            <option>Nellore</option>
            <option>Kurnool</option>
            <option>Ongole</option>
            <option>Eluru</option>
            <option>Anantapur</option>
            <option>Kadapa</option>
          </select>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select id="role" required>
            <option value="USER">Standard User (Rent Cars)</option>
            <option value="OWNER">Car Owner (List & Rent Cars)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Driving License No. (Optional)</label>
        <input type="text" id="drivingLicense" placeholder="AP38 20210123456"/>
      </div>
      <button type="submit" class="btn btn-primary form-submit btn-lg" id="registerBtn">
        Create My Account 🚗
      </button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
  </div>
</main>

<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('carRentalToken')) {
     const user = JSON.parse(localStorage.getItem('carRentalUser') || '{}');
     if (user.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
     else if (user.role === 'OWNER') window.location.href = 'owner-dashboard.html';
     else window.location.href = 'user-dashboard.html';
  }
});

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';

  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirmPassword').value;
  if (password !== confirm) {
    errorMsg.textContent = '❌ Passwords do not match!';
    errorMsg.style.display = 'block';
    return;
  }

  btn.innerHTML = '⏳ Creating account...';
  btn.disabled = true;

  const payload = {
    name:           document.getElementById('name').value,
    email:          document.getElementById('email').value,
    password:       password,
    phone:          document.getElementById('phone').value,
    city:           document.getElementById('city').value,
    drivingLicense: document.getElementById('drivingLicense').value,
    role:           document.getElementById('role').value
  };

  try {
    const data = await apiFetch('/api/auth/register', 'POST', payload);
    localStorage.setItem('carRentalToken', data.token);
    localStorage.setItem('carRentalUser', JSON.stringify({ id: data.userId, name: data.name, email: data.email, role: data.role }));
    showToast('🎉 Account created! Welcome to AP Cars, ' + data.name, 'success');
    setTimeout(() => {
      if (data.role === 'ADMIN') window.location.href = 'admin-dashboard.html';
      else if (data.role === 'OWNER') window.location.href = 'owner-dashboard.html';
      else window.location.href = 'user-dashboard.html';
    }, 1000);
  } catch (err) {
    errorMsg.textContent = '❌ ' + (err.message || 'Registration failed. Try a different email.');
    errorMsg.style.display = 'block';
    btn.innerHTML = 'Create My Account 🚗';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
