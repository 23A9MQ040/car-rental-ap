server.port=8080

# ==========================================
# 1. H2 Database Configuration (Development)
# ==========================================
# Uncomment these lines to use H2 (In-Memory DB)
spring.datasource.url=jdbc:h2:mem:cardb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# 2. MySQL Configuration (Production)
# ==========================================
# Uncomment these lines to use MySQL and comment the H2 section above
# spring.datasource.url=jdbc:mysql://localhost:3306/car_rental_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# Hibernate Configuration
# ==========================================
# Auto-create or update tables based on entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

